apiVersion: apps/v1
kind: Deployment
metadata:
  name: s2s-agent
  namespace: elm-s2s
  labels:
    app: s2s-agent
    component: agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s2s-agent
  template:
    metadata:
      labels:
        app: s2s-agent
        component: agent
    spec:
      nodeSelector:
        cloud.google.com/gke-nodepool: general-e-standard-8-nsk
      imagePullSecrets:
        - name: regcred
      containers:
        - name: s2s-agent
          # Image built and pushed by k8s/build-push.sh
          image: me-central2-docker.pkg.dev/researchdeployments/nsk-s2s/s2s-agent:build-20260518134240-f9d02a7d
          imagePullPolicy: Always
          command: ["python", "agent.py", "start"]
          envFrom:
            # Non-sensitive defaults (STT/LLM/TTS providers, agent tuning knobs)
            - configMapRef:
                name: s2s-config
          env:
            # Sensitive overrides from Secret — these take precedence over ConfigMap.
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: LIVEKIT_API_KEY
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: LIVEKIT_API_SECRET
            - name: CUSTOM_STT_URL
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: CUSTOM_STT_URL
            - name: CUSTOM_STT_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: CUSTOM_STT_ACCESS_TOKEN
            - name: CUSTOM_LLM_URL
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: CUSTOM_LLM_URL
            - name: CUSTOM_LLM_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: CUSTOM_LLM_ACCESS_TOKEN
            - name: CUSTOM_LLM_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: CUSTOM_LLM_CLIENT_ID
            - name: CUSTOM_LLM_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: CUSTOM_LLM_CLIENT_SECRET
            - name: CUSTOM_TTS_URL
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: CUSTOM_TTS_URL
            - name: CUSTOM_TTS_ACCESS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: CUSTOM_TTS_ACCESS_TOKEN
            # Milvus auth — same token nlp-rag-app uses (`root:Milvus`).
            # Only consumed when CUSTOM_LLM_PROVIDER=nusuk_rag.
            - name: MILVUS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: s2s-secrets
                  key: MILVUS_TOKEN
          ports:
            - name: metrics
              containerPort: 9090
              protocol: TCP
            - name: health
              containerPort: 8081
              protocol: TCP
          volumeMounts:
            - name: prom-multiproc
              mountPath: /tmp/prom_multiproc
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2000m"
              memory: "3Gi"
          readinessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: 8081
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
      volumes:
        - name: prom-multiproc
          emptyDir: {}
